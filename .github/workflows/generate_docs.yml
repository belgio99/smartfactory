name: Generate Python Documentation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        input_dirs: 
          - ../kb
          - ../api
          - ../data-processing
          - ../rag
          - ../gui-panel
          - ../kpi-engine
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Install Python and dependencies
      - name: Install Python and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install --upgrade pip

      # Install required tools for Doxygen
      - name: Install Doxygen and tools
        run: |
          sudo apt-get install -y doxygen graphviz texlive-latex-base texlive-latex-extra texlive-fonts-recommended ghostscript

      # Set Doxygen INPUT dynamically
      - name: Configure Doxygen INPUT
        working-directory: ./docs
        run: |
          input_dir="${{ matrix.input_dirs }}"
          sed -i "s|^INPUT.*|INPUT = ${input_dir}|" Doxyfile

      # Run Doxygen using the modified Doxyfile
      - name: Run Doxygen
        working-directory: ./docs
        run: doxygen Doxyfile

      # Compile the LaTeX output to PDF
      - name: Generate PDF from LaTeX
        working-directory: ./docs/latex
        run: |
          pdflatex refman.tex
          pdflatex refman.tex # Run twice for proper indexing

      # Rename the output PDF with a directory-specific name
      - name: Rename PDF
        working-directory: ./docs/latex
        run: |
          dir_name=$(basename "${{ matrix.input_dirs }}")
          mv refman.pdf "api_docs_${dir_name}.pdf"

      # Upload PDF as an artifact
      - name: Upload documentation artifact
        working-directory: ./docs/latex
        run: |
          sanitized_dir_name=$(basename "${{ matrix.input_dirs }}" | tr -cd '[:alnum:]-_')
          echo "Uploading artifact with name: python-documentation-${sanitized_dir_name}"
        with:
          name: python-documentation-${{ matrix.input_dirs | toJSON | fromJSON | replace('../', '') | replace('/', '-') }}
          path: api_docs_*.pdf
